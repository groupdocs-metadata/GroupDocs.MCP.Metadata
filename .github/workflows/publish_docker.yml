name: Publish Docker Image

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  publish_docker:
    # Only run when triggered by a version tag. Branch dispatches (e.g. Run workflow
    # from `main`) are skipped so we never tag a Docker image `:latest` from a random commit.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Verify required secrets are configured
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          missing=()
          [[ -z "$DOCKERHUB_USERNAME" ]] && missing+=("DOCKERHUB_USERNAME")
          [[ -z "$DOCKERHUB_TOKEN" ]] && missing+=("DOCKERHUB_TOKEN")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}. Configure under Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          echo "All required secrets present."

      - uses: actions/checkout@v4

      - name: Set image names
        id: images
        run: |
          OWNER="${{ github.repository_owner }}"
          echo "ghcr=ghcr.io/${OWNER,,}/metadata-mcp" >> $GITHUB_OUTPUT
          echo "dockerhub=groupdocs/metadata-mcp" >> $GITHUB_OUTPUT

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep -oP '<GroupDocsMetadataMcp>\K[^<]+' build/dependencies.props)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.images.outputs.ghcr }}:${{ steps.version.outputs.version }}
            ${{ steps.images.outputs.ghcr }}:latest
            ${{ steps.images.outputs.dockerhub }}:${{ steps.version.outputs.version }}
            ${{ steps.images.outputs.dockerhub }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
