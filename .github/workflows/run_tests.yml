name: Run Tests

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '**/*.csproj'
      - 'src/Directory.Build.props'
      - 'build/**'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - '**/*.csproj'
      - 'src/Directory.Build.props'
      - 'build/**'
  workflow_dispatch:

jobs:
  validate-mcp-manifest:
    name: Validate .mcp/server.json schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Fetch MCP server.json schema
        run: |
          SCHEMA_URL=$(jq -r '."$schema"' src/GroupDocs.Metadata.Mcp/.mcp/server.json)
          echo "Fetching schema from $SCHEMA_URL"
          curl -fsSL -o server.schema.json "$SCHEMA_URL"

      - name: Validate server.json
        run: |
          ajv validate \
            --spec=draft2020 \
            -c ajv-formats \
            -s server.schema.json \
            -d src/GroupDocs.Metadata.Mcp/.mcp/server.json \
            --all-errors

      - name: Confirm server.json version matches dependencies.props
        shell: pwsh
        run: |
          [xml]$deps = Get-Content build/dependencies.props
          $expected = $deps.SelectSingleNode('//GroupDocsMetadataMcp').InnerText.Trim()
          $serverJson = Get-Content src/GroupDocs.Metadata.Mcp/.mcp/server.json -Raw
          $pattern = '"version"\s*:\s*"' + [regex]::Escape($expected) + '"'
          $count = [regex]::Matches($serverJson, $pattern).Count
          if ($count -ne 2) {
            Write-Error "server.json version drift: expected both version fields = '$expected' (found $count of 2)."
            exit 1
          }
          Write-Host "server.json version '$expected' matches dependencies.props"

  test:
    name: Test on .NET ${{ matrix.dotnet-version }}
    runs-on: windows-latest
    strategy:
      matrix:
        dotnet-version:
          - '10.0.x'
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore dependencies
        run: dotnet restore ./src/GroupDocs.Metadata.Mcp.sln

      - name: Build solution
        run: dotnet build ./src/GroupDocs.Metadata.Mcp.sln --no-restore --configuration Release

      - name: Run tests
        run: >
          dotnet test
          ./src/GroupDocs.Metadata.Mcp.Tests/GroupDocs.Metadata.Mcp.Tests.csproj
          --no-build
          --configuration Release
          --verbosity normal
          --logger "trx;LogFileName=test-results-${{ matrix.dotnet-version }}.trx"
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.dotnet-version }}
          path: |
            **/test-results-*.trx
            **/coverage.cobertura.xml
          retention-days: 30

  publish-test-results:
    name: "Publish Tests Results"
    needs: test
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
      issues: read
    if: always()

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: test-results-*
          merge-multiple: true

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "artifacts/**/*.trx"
          check_name: "Test Results"
          comment_mode: always
          report_individual_runs: true
          fail_on: "test failures"
